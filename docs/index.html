<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLO Competitive Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-on  { border-bottom: 2px solid #2563eb; color: #2563eb; }
    .tab-off { border-bottom: 2px solid transparent; color: #64748b; }
    .badge-Critical { background:#fee2e2; color:#b91c1c; }
    .badge-High     { background:#ffedd5; color:#c2410c; }
    .badge-Medium   { background:#fef9c3; color:#a16207; }
    .badge-Low      { background:#dcfce7; color:#15803d; }
    .subseg-btn-on  { background:#2563eb; color:#fff; }
    .subseg-btn-off { background:#fff; border:1px solid #e2e8f0; color:#475569; }
  </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

<div class="bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between shadow-sm flex-shrink-0">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-cyan-400 flex items-center justify-center text-white font-bold shadow">FLO</div>
    <div>
      <div class="font-bold text-slate-800">Competitive Intelligence Agent</div>
      <div class="text-xs text-slate-400">Autonomous · GitHub Actions · Supabase · GitHub Pages · 100% Free</div>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="last-run" class="text-xs text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full hidden"></div>
  </div>
</div>

<div class="bg-white border-b border-slate-200 px-5 flex flex-shrink-0">
  <button onclick="setTab('dashboard')" id="tab-dashboard" class="px-4 py-2.5 text-sm font-medium tab-on">Dashboard</button>
  <button onclick="setTab('report')"    id="tab-report"    class="px-4 py-2.5 text-sm font-medium tab-off">Report</button>
  <button onclick="setTab('landscape')" id="tab-landscape" class="px-4 py-2.5 text-sm font-medium tab-off">Landscape</button>
  <button onclick="setTab('history')"   id="tab-history"   class="px-4 py-2.5 text-sm font-medium tab-off">History</button>
</div>

<div class="flex-1 overflow-y-auto" id="content">
  <div class="flex items-center justify-center h-full text-slate-400">
    <div class="text-center"><div class="text-5xl mb-3">&#9203;</div><p>Loading...</p></div>
  </div>
</div>

<script>
var B2B_SUB_SEGS = ["Pro/Plumber","Multi Family","Utility","Insurance","Enterprise"];
var SUB_SEG_LABELS = {
  "Pro/Plumber":  "Pro / Plumber Partnerships",
  "Multi Family": "Multi Family",
  "Utility":      "Utility Partnerships",
  "Insurance":    "Insurance Partnerships",
  "Enterprise":   "Enterprise Business"
};
var S = { reports:[], settings:{}, tab:"dashboard", selReport:null, selIdx:-1, seg:"B2B", subSeg:"Multi Family" };

function clean(t) {
  if (!t) return "";
  return String(t).replace(/<cite[^>]*>/g,"").replace(/<\/cite>/g,"").replace(/&quot;/g,'"').trim();
}

function badge(l) {
  var m = {Critical:"badge-Critical",High:"badge-High",Medium:"badge-Medium",Low:"badge-Low"};
  return '<span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(m[l]||m.Low)+'">'+l+'</span>';
}

function fmt(d) { return new Date(d).toLocaleDateString(); }
function fmtFull(d) { return new Date(d).toLocaleString(); }

function getComps() {
  if (!S.selReport || !S.selReport.competitor_data) return [];
  return S.selReport.competitor_data;
}

async function init() {
  try {
    var r = await fetch("data.json?t="+Date.now());
    var d = await r.json();
    S.reports = d.reports||[];
    S.settings = d.settings||{};
    if (S.reports.length) S.selReport = S.reports[0];
    if (S.settings.lastRun) {
      var el = document.getElementById("last-run");
      var days = Math.max(0,Math.ceil((new Date(S.settings.lastRun).getTime()+7*86400000-Date.now())/86400000));
      el.textContent = "Last run "+fmt(S.settings.lastRun)+" - Next in "+days+"d";
      el.classList.remove("hidden");
    }
  } catch(e) { console.error(e); }
  render();
}

function setTab(t) {
  S.tab = t;
  ["dashboard","report","landscape","history"].forEach(function(id) {
    document.getElementById("tab-"+id).className = "px-4 py-2.5 text-sm font-medium "+(t===id?"tab-on":"tab-off");
  });
  render();
}

function pickComp(idx) {
  S.selIdx = idx;
  var comp = getComps()[idx];
  if (comp) {
    S.seg = comp.segment;
    if (comp.segment === "B2B" && comp.subSegment) S.subSeg = comp.subSegment;
  }
  setTab("landscape");
}

function setSeg(s) { S.seg = s; render(); }
function setSubSeg(s) { S.subSeg = s; render(); }
function pickReport(i) { S.selReport = S.reports[parseInt(i)]; S.selIdx = -1; render(); }
function pickAndView(i) { S.selReport = S.reports[i]; setTab("report"); }

function mdRender(text) {
  if (!text) return "<p class='text-slate-400 text-sm'>No content.</p>";
  return clean(text).split("\n").map(function(line) {
    if (line.startsWith("## "))  return '<h2 class="text-base font-bold text-slate-800 mt-4 mb-1 pt-3 border-t border-slate-100">'+line.slice(3)+'</h2>';
    if (line.startsWith("### ")) return '<h3 class="text-sm font-semibold text-slate-700 mt-3 mb-1">'+line.slice(4)+'</h3>';
    if (line.match(/^\d+\.\s/))  return '<p class="text-sm text-slate-700 ml-3 my-0.5">'+line+'</p>';
    if (line.startsWith("- "))   return '<div class="flex gap-2 ml-3 my-0.5"><span class="text-blue-400 text-xs">*</span><span class="text-sm text-slate-700">'+line.slice(2)+'</span></div>';
    if (!line.trim())             return '<div class="h-1"></div>';
    return '<p class="text-sm text-slate-700 leading-relaxed my-0.5">'+line+'</p>';
  }).join("");
}

function compDetail(comp) {
  if (!comp) return '<div class="flex items-center justify-center h-64 text-slate-400 text-sm">Select a competitor to see full analysis</div>';
  var tColors = {Critical:"red",High:"orange",Medium:"yellow",Low:"green"};
  var tc = tColors[comp.threatLevel]||"green";
  var html = '<div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">';
  html += '<div class="flex justify-between items-start mb-4">';
  html += '<div><h3 class="font-bold text-xl">'+clean(comp.competitor)+'</h3>';
  var subLabel = comp.subSegment ? SUB_SEG_LABELS[comp.subSegment]||comp.subSegment : clean(comp.segment);
  html += '<div class="text-sm text-slate-400 mt-1">'+subLabel+' · Researched '+fmt(comp.researchDate)+'</div></div>';
  html += badge(comp.threatLevel)+'</div>';
  if (comp.threatRationale) {
    html += '<div class="bg-'+tc+'-50 border border-'+tc+'-100 rounded-lg px-4 py-3 mb-4">';
    html += '<div class="text-xs font-bold text-'+tc+'-700 mb-1">Why '+comp.threatLevel+' Threat</div>';
    html += '<div class="text-sm text-'+tc+'-800">'+clean(comp.threatRationale)+'</div></div>';
  }
  if (comp.strategicSignal) {
    html += '<div class="bg-amber-50 border border-amber-100 rounded-lg px-4 py-3 mb-4">';
    html += '<div class="text-xs font-bold text-amber-700 mb-1">KEY SIGNAL</div>';
    html += '<div class="text-sm text-amber-800">'+clean(comp.strategicSignal)+'</div></div>';
  }
  if (comp.commercializationModel) {
    html += '<div class="bg-slate-50 border border-slate-100 rounded-lg px-4 py-3 mb-4">';
    html += '<div class="text-xs font-bold text-slate-600 mb-1">COMMERCIALIZATION MODEL</div>';
    html += '<div class="text-sm text-slate-700">'+clean(comp.commercializationModel)+'</div></div>';
  }
  if (comp.pricing) {
    html += '<div class="mb-4"><div class="text-xs font-bold text-slate-500 uppercase mb-1">Pricing</div>';
    html += '<div class="text-sm text-slate-700">'+clean(comp.pricing)+'</div></div>';
  }
  html += '<div class="grid grid-cols-2 gap-4 mb-4">';
  html += '<div><div class="text-xs font-bold text-green-700 uppercase mb-2">Strengths</div><ul>';
  (comp.strengths||[]).forEach(function(s){html+='<li class="text-sm flex gap-2 mb-1.5"><span class="text-green-400">+</span><span>'+clean(s)+'</span></li>';});
  html += '</ul></div>';
  html += '<div><div class="text-xs font-bold text-red-700 uppercase mb-2">Weaknesses</div><ul>';
  (comp.weaknesses||[]).forEach(function(w){html+='<li class="text-sm flex gap-2 mb-1.5"><span class="text-red-400">-</span><span>'+clean(w)+'</span></li>';});
  html += '</ul></div></div>';
  if ((comp.recentDevelopments||[]).length) {
    html += '<div class="mb-4"><div class="text-xs font-bold text-blue-700 uppercase mb-2">Recent Developments</div><ul>';
    comp.recentDevelopments.forEach(function(d){html+='<li class="text-sm flex gap-2 mb-1.5"><span class="text-blue-400">*</span><span>'+clean(d)+'</span></li>';});
    html += '</ul></div>';
  }
  if (comp.floAdvantage) {
    html += '<div class="bg-blue-50 border border-blue-100 rounded-lg px-4 py-3">';
    html += '<div class="text-xs font-bold text-blue-700 mb-1">FLO ADVANTAGE</div>';
    html += '<div class="text-sm text-blue-800">'+clean(comp.floAdvantage)+'</div></div>';
  }
  html += '</div>';
  return html;
}

function render() {
  var c = document.getElementById("content");
  var allComps = getComps();
  var b2b = allComps.filter(function(x){return x.segment==="B2B";});
  var b2c = allComps.filter(function(x){return x.segment==="B2C";});
  var highs = allComps.filter(function(x){return x.threatLevel==="Critical"||x.threatLevel==="High";});
  var newOnes = allComps.filter(function(x){return x.isNewEntrant;});

  if (S.tab==="dashboard") {
    var html = '<div class="p-5 space-y-4">';

    // KPI cards
    html += '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">';
    [{l:"Tracked",v:allComps.length||"--",s:b2b.length+" B2B · "+b2c.length+" B2C",col:"blue"},
     {l:"Reports",v:S.reports.length,s:S.reports.length?"Last "+fmt(S.reports[0].generated_at):"None yet",col:"purple"},
     {l:"High Threats",v:highs.length,s:highs.map(function(x){return clean(x.competitor);}).slice(0,2).join(", ")||"None yet",col:"red"},
     {l:"New Entrants",v:newOnes.length,s:newOnes.length?"Discovered this run":"None this run",col:"green"}
    ].forEach(function(card) {
      html += '<div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm"><div class="text-3xl font-bold text-'+card.col+'-600">'+card.v+'</div><div class="text-xs font-semibold text-slate-700 mt-1">'+card.l+'</div><div class="text-xs text-slate-400 mt-0.5 truncate">'+card.s+'</div></div>';
    });
    html += '</div>';

    if (allComps.length) {
      // B2C section
      html += '<div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">';
      html += '<div class="font-semibold text-sm mb-3 text-slate-700">B2C</div>';
      html += '<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">';
      b2c.forEach(function(comp) {
        var idx = allComps.indexOf(comp);
        html += '<div class="flex items-center justify-between py-2 px-3 border border-slate-100 rounded-lg cursor-pointer hover:bg-blue-50" onclick="pickComp('+idx+')">';
        html += '<span class="text-sm font-medium truncate">'+clean(comp.competitor)+'</span>'+badge(comp.threatLevel)+'</div>';
      });
      html += '</div></div>';

      // B2B sub-segments
      html += '<div class="space-y-3">';
      html += '<div class="font-semibold text-sm text-slate-700 px-1">B2B</div>';
      B2B_SUB_SEGS.forEach(function(sub) {
        var segComps = b2b.filter(function(x){return x.subSegment===sub;});
        if (!segComps.length) return;
        var segHighs = segComps.filter(function(x){return x.threatLevel==="Critical"||x.threatLevel==="High";});
        html += '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">';
        html += '<div class="px-4 py-2.5 bg-slate-50 border-b border-slate-100 flex items-center justify-between">';
        html += '<span class="text-xs font-bold text-slate-600 uppercase tracking-wide">'+SUB_SEG_LABELS[sub]+'</span>';
        if (segHighs.length) html += '<span class="text-xs text-red-600 font-medium">'+segHighs.length+' high threat'+(segHighs.length>1?'s':'')+'</span>';
        html += '</div>';
        html += '<div class="divide-y divide-slate-50">';
        segComps.forEach(function(comp) {
          var idx = allComps.indexOf(comp);
          html += '<div class="flex items-center justify-between px-4 py-2.5 cursor-pointer hover:bg-blue-50" onclick="pickComp('+idx+')">';
          html += '<span class="text-sm font-medium">'+clean(comp.competitor)+'</span>'+badge(comp.threatLevel)+'</div>';
        });
        html += '</div></div>';
      });
      // B2B competitors without a sub-segment (legacy data)
      var unsorted = b2b.filter(function(x){return !x.subSegment;});
      if (unsorted.length) {
        html += '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">';
        html += '<div class="px-4 py-2.5 bg-slate-50 border-b border-slate-100"><span class="text-xs font-bold text-slate-600 uppercase tracking-wide">Other B2B</span></div>';
        html += '<div class="divide-y divide-slate-50">';
        unsorted.forEach(function(comp) {
          var idx = allComps.indexOf(comp);
          html += '<div class="flex items-center justify-between px-4 py-2.5 cursor-pointer hover:bg-blue-50" onclick="pickComp('+idx+')">';
          html += '<span class="text-sm font-medium">'+clean(comp.competitor)+'</span>'+badge(comp.threatLevel)+'</div>';
        });
        html += '</div></div>';
      }
      html += '</div>'; // end B2B space-y-3
    } else {
      html += '<div class="bg-blue-50 border border-blue-100 rounded-xl p-8 text-center"><div class="text-5xl mb-3">&#129302;</div><div class="font-bold text-blue-800 text-lg mb-1">Agent Ready</div><div class="text-sm text-blue-600">No runs yet. Trigger the first run from GitHub Actions.</div></div>';
    }
    html += '</div>';
    c.innerHTML = html;
  }

  else if (S.tab==="report") {
    if (!S.selReport) { c.innerHTML='<div class="flex items-center justify-center h-64 text-slate-400">No reports yet.</div>'; return; }
    var html = '<div class="p-5">';
    html += '<div class="flex items-center justify-between mb-4">';
    html += '<div><h2 class="font-bold text-lg">Weekly Competitive Intelligence Report</h2>';
    html += '<div class="text-sm text-slate-400">Generated '+fmtFull(S.selReport.generated_at)+' · '+((S.selReport.competitor_data||[]).length)+' competitors · '+S.selReport.scope+'</div></div>';
    if (S.reports.length>1) {
      html += '<select onchange="pickReport(this.value)" class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm">';
      S.reports.forEach(function(r,i){html+='<option value="'+i+'" '+(S.selReport===r?"selected":"")+'>'+(i===0?"Latest — ":"")+fmt(r.generated_at)+'</option>';});
      html += '</select>';
    }
    html += '</div><div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">'+mdRender(S.selReport.executive_report)+'</div></div>';
    c.innerHTML = html;
  }

  else if (S.tab==="landscape") {
    if (!allComps.length) { c.innerHTML='<div class="flex items-center justify-center h-64 text-slate-400">Run the agent to populate.</div>'; return; }
    var selComp = S.selIdx>=0 ? allComps[S.selIdx] : null;
    var html = '<div class="p-5"><div class="grid grid-cols-3 gap-4">';

    // Left panel — segment + sub-segment filters + competitor list
    html += '<div class="col-span-1">';
    // Segment switcher
    html += '<div class="flex gap-2 mb-3">';
    ["B2B","B2C"].forEach(function(s){
      html += '<button onclick="setSeg(\''+s+'\')" class="px-4 py-1.5 rounded-full text-sm font-medium '+(S.seg===s?"bg-blue-600 text-white":"bg-white border border-slate-200 text-slate-600")+'">'+s+'</button>';
    });
    html += '</div>';

    if (S.seg === "B2B") {
      // Sub-segment pills
      html += '<div class="flex flex-wrap gap-1.5 mb-3">';
      B2B_SUB_SEGS.forEach(function(sub) {
        var hasData = allComps.some(function(x){return x.segment==="B2B"&&x.subSegment===sub;});
        if (!hasData) return;
        html += '<button onclick="setSubSeg(\''+sub+'\')" class="px-3 py-1 rounded-full text-xs font-medium '+(S.subSeg===sub?"subseg-btn-on":"subseg-btn-off")+'">'+sub+'</button>';
      });
      html += '</div>';
      // Competitor list for selected sub-segment
      var segData = allComps.filter(function(x){return x.segment==="B2B"&&x.subSegment===S.subSeg;});
      segData.forEach(function(comp) {
        var idx = allComps.indexOf(comp);
        var active = idx===S.selIdx;
        html += '<div onclick="pickComp('+idx+')" class="flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer mb-1 '+(active?"bg-blue-600 text-white":"bg-white hover:bg-slate-100 border border-slate-200")+'">';
        html += '<span class="text-sm font-medium">'+clean(comp.competitor)+'</span>';
        html += '<span class="text-xs px-1.5 py-0.5 rounded font-semibold '+(active?"bg-white/20 text-white":comp.threatLevel==="Critical"?"bg-red-100 text-red-700":comp.threatLevel==="High"?"bg-orange-100 text-orange-700":comp.threatLevel==="Medium"?"bg-yellow-100 text-yellow-700":"bg-green-100 text-green-700")+'">'+comp.threatLevel+'</span>';
        html += '</div>';
      });
    } else {
      // B2C list
      var b2cData = allComps.filter(function(x){return x.segment==="B2C";});
      b2cData.forEach(function(comp) {
        var idx = allComps.indexOf(comp);
        var active = idx===S.selIdx;
        html += '<div onclick="pickComp('+idx+')" class="flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer mb-1 '+(active?"bg-blue-600 text-white":"bg-white hover:bg-slate-100 border border-slate-200")+'">';
        html += '<span class="text-sm font-medium">'+clean(comp.competitor)+'</span>';
        html += '<span class="text-xs px-1.5 py-0.5 rounded font-semibold '+(active?"bg-white/20 text-white":comp.threatLevel==="Critical"?"bg-red-100 text-red-700":comp.threatLevel==="High"?"bg-orange-100 text-orange-700":comp.threatLevel==="Medium"?"bg-yellow-100 text-yellow-700":"bg-green-100 text-green-700")+'">'+comp.threatLevel+'</span>';
        html += '</div>';
      });
    }

    html += '</div><div class="col-span-2">'+compDetail(selComp)+'</div></div></div>';
    c.innerHTML = html;
  }

  else if (S.tab==="history") {
    var html = '<div class="p-5"><h2 class="font-bold text-lg mb-4">Report History</h2>';
    if (!S.reports.length) { html += '<div class="text-slate-400 text-center py-16">No reports yet.</div>'; }
    else {
      html += '<div class="space-y-3">';
      S.reports.forEach(function(r,i){
        var comps = r.competitor_data||[];
        var hs = comps.filter(function(x){return x.threatLevel==="Critical"||x.threatLevel==="High";});
        html += '<div onclick="pickAndView('+i+')" class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm cursor-pointer hover:border-blue-300">';
        html += '<div class="font-semibold text-sm">'+(i===0?"Latest — ":"")+fmtFull(r.generated_at)+'</div>';
        html += '<div class="text-xs text-slate-400 mt-0.5">'+comps.length+' competitors · '+r.scope+(hs.length?' · '+hs.length+' high threat(s)':'')+'</div>';
        if (r.errors&&r.errors.length) html += '<div class="text-xs text-red-400 mt-1">'+r.errors.length+' error(s)</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
    c.innerHTML = html;
  }
}

init();
</script>
</body>
</html>
